<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>【土淵中】団体戦 速報ダッシュボード</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Roboto+Mono:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --team-bg: #1b5e20; --team-gold: #fbc02d; --bg: #e8f5e9; --surface: #ffffff; --border: #a5d6a7; --text: #1f2937; --text-dim: #6b7280; --blue: #1976d2; --red: #d32f2f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        
        .dash-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--team-bg); color: #fff; border-radius: 8px; margin-bottom: 20px; border-bottom: 4px solid var(--team-gold); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
        
        .m-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.08); overflow: hidden; }
        .mc-top { background: var(--team-bg); color: var(--team-gold); padding: 8px 12px; display: flex; justify-content: space-between; font-weight: bold; font-size: 0.85rem; }
        
        .team-battle-area { padding: 15px; text-align: center; border-bottom: 2px dashed var(--border); background: #ffffff; }
        .team-status { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 900; margin-bottom: 10px; }
        .team-status.running { background: #e3f2fd; color: #1976d2; }
        .team-status.winner { background: #fff8e1; color: #f57f17; border: 2px solid #fbc02d; font-size: 1.15rem; }
        .team-status.draw { background: #f5f5f5; color: #616161; border: 2px solid #9e9e9e; font-size: 1.1rem; }
        
        .tba-names { font-size: 1.3rem; font-weight: 900; display: flex; justify-content: space-around; margin-bottom: 5px; align-items: center; }
        .tba-wins { font-family: 'Roboto Mono', monospace; font-size: 3.5rem; font-weight: 900; color: var(--blue); line-height: 1; }
        
        .match-list { display: flex; flex-direction: column; }
        .match-row { padding: 12px 10px; border-bottom: 1px solid #f1f8e9; text-decoration: none; color: inherit; display: block; }
        
        .match-row.active { background: #e8f5e9; border-left: 5px solid var(--team-gold); transition: 0.2s; }
        .match-row.active:hover { background: #c8e6c9; }
        .match-row.completed { background: #f3f4f6; border-left: 5px solid #9ca3af; }
        .match-row.aborted { background: #f9f9f9; border-left: 5px solid #e0e0e0; opacity: 0.6; }
        .match-row.waiting { background: #ffffff; border-left: 5px solid transparent; }
        
        .match-title { font-size: 0.75rem; font-weight: bold; color: var(--text-dim); text-align: center; margin-bottom: 8px; }
        .badge-live { color: var(--team-bg); font-weight: 900; background: #c8e6c9; border-radius: 4px; padding: 4px 10px; display: inline-block; }
        .badge-finished { color: #fff; font-weight: 900; background: #9ca3af; border-radius: 4px; padding: 4px 10px; display: inline-block; }
        .badge-waiting { color: #999; font-weight: bold; background: #f1f1f1; border-radius: 4px; padding: 2px 8px; display: inline-block;}
        .badge-aborted { color: #777; font-weight: bold; background: #e0e0e0; border-radius: 4px; padding: 2px 8px; display: inline-block;}

        .match-content { display: flex; justify-content: space-between; align-items: center; }
        .m-players { font-size: 0.85rem; font-weight: bold; line-height: 1.3; }
        .m-players.left { text-align: left; width: 26%; }
        .m-players.right { text-align: right; width: 26%; }
        
        .m-score-area { width: 48%; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .g-num { font-family: 'Roboto Mono', monospace; font-size: 1.6rem; font-weight: 900; width: 20px; text-align: center; }
        .p-box { display: flex; justify-content: center; align-items: center; background: #333; color: #fff; padding: 4px 8px; border-radius: 6px; font-family: 'Roboto Mono', monospace; font-size: 1rem; gap: 4px; width: 65px; height: 30px; }
    </style>
</head>
<body>
    <div class="dash-header">
        <div style="font-weight:900; font-size:1.1rem;">【土淵中】速報ダッシュボード</div>
        <div id="d-time" style="font-size: 0.8rem; font-weight:bold;">更新中...</div>
    </div>
    
    <div class="grid-container" id="grid-wrap">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; font-weight: bold; color: var(--team-bg);">データを読み込んでいます...</div>
    </div>

    <script>
        // ★新しいAPI URLに変更
        const GAS_URL_LIVE = "https://script.google.com/macros/s/AKfycbzi-0SNXjjv5mOfuU7X6Zs5Id7fzhTHPGihZ1w-N58TE5-axZKe7AFfhxd3T7gI0VMqBw/exec";
        
        // ★コート1〜18の表示マップを生成
        const COURT_NAME_MAP = {};
        for(let i=1; i<=18; i++) COURT_NAME_MAP['court_'+i] = i+'コート';

        window.onload = () => { fetchDashboard(); setInterval(fetchDashboard, 5000); };

        async function fetchDashboard() {
            try {
                const response = await fetch(`${GAS_URL_LIVE}?all=true`);
                const matches = await response.json();
                renderDashboard(matches);
                document.getElementById('d-time').textContent = new Date().toLocaleTimeString() + ' 自動更新中';
            } catch (error) { console.error("Fetch Error:", error); }
        }

        function getDisp(l, r, fin) { const border = fin ? 6 : 3; if (l < border || r < border) return { l, r }; if (l === r) return { l: 'D', r: 'D' }; if (l > r) return { l: 'A', r: 'D' }; return { l: 'D', r: 'A' }; }

        function renderDashboard(matches) {
            const wrap = document.getElementById('grid-wrap');
            if (!matches || matches.length === 0) { 
                wrap.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px;font-weight:bold;color:var(--team-bg);">現在、進行中または終了した試合のデータはありません</div>'; 
                return; 
            }

            const mergedTeams = {};
            matches.forEach(data => {
                if(data.type !== 'team_match' || !data.TS) return;
                const TS = data.TS;
                
                const roomKey = TS.roomCode ? `ROOM_${TS.roomCode}` : null;
                const fallbackKey = `${(TS.meta.tourney||'').trim()}_${TS.gender}_${(TS.teamL||'').trim()}_${(TS.teamR||'').trim()}`;
                const matchKey = roomKey || fallbackKey;
                
                if (!mergedTeams[matchKey]) {
                    mergedTeams[matchKey] = { TS: JSON.parse(JSON.stringify(TS)), courts: [], activeMatchesData: {} };
                    if(!mergedTeams[matchKey].TS.matchResults) mergedTeams[matchKey].TS.matchResults = [];
                    if(!mergedTeams[matchKey].TS.matchOrders) mergedTeams[matchKey].TS.matchOrders = [{A:'',B:'',C:'',D:''},{A:'',B:'',C:'',D:''},{A:'',B:'',C:'',D:''}];
                }
                
                const courtDisp = COURT_NAME_MAP[data.S.meta.court] || data.S.meta.court;
                if(!mergedTeams[matchKey].courts.includes(courtDisp)) mergedTeams[matchKey].courts.push(courtDisp);

                if (TS.matchResults) {
                    TS.matchResults.forEach((res, idx) => { if (res) mergedTeams[matchKey].TS.matchResults[idx] = res; });
                }
                if (TS.matchOrders) {
                    TS.matchOrders.forEach((o, idx) => { if (o && o.A && o.A !== '-') mergedTeams[matchKey].TS.matchOrders[idx] = o; });
                }
                if (TS.meta && TS.meta.playMode) mergedTeams[matchKey].TS.meta.playMode = TS.meta.playMode;

                mergedTeams[matchKey].activeMatchesData[TS.currentMatchNum] = data.S;
            });

            wrap.innerHTML = Object.values(mergedTeams).map(group => {
                const TS = group.TS;
                const courtDisplay = group.courts.join(', ');
                
                let wL = 0, wR = 0, finishedCount = 0;
                for(let i=0; i<3; i++) {
                    if(TS.matchResults[i]) {
                        finishedCount++;
                        let isL_OP = TS.matchResults[i].A.includes('(OP)') || TS.matchResults[i].B.includes('(OP)');
                        let isR_OP = TS.matchResults[i].C.includes('(OP)') || TS.matchResults[i].D.includes('(OP)');
                        if (isL_OP && !isR_OP) { wR++; }
                        else if (isR_OP && !isL_OP) { wL++; }
                        else { TS.matchResults[i].gL > TS.matchResults[i].gR ? wL++ : wR++; }
                    }
                }
                TS.winsL = wL; TS.winsR = wR;

                const playMode = TS.meta.playMode || 'all';
                let isTeamMatchFinished = false;
                let statusHtml = `<div class="team-status running">団体戦 進行中</div>`;
                
                if (playMode === 'first_to_2') {
                    if (wL >= 2) { isTeamMatchFinished = true; statusHtml = `<div class="team-status winner">${TS.teamL} 勝利！ ※打ち切り</div>`; }
                    else if (wR >= 2) { isTeamMatchFinished = true; statusHtml = `<div class="team-status winner">${TS.teamR} 勝利！ ※打ち切り</div>`; }
                } else {
                    if (finishedCount === 3) {
                        isTeamMatchFinished = true;
                        if (wL > wR) statusHtml = `<div class="team-status winner">${TS.teamL} 勝利！</div>`;
                        else if (wR > wL) statusHtml = `<div class="team-status winner">${TS.teamR} 勝利！</div>`;
                        else statusHtml = `<div class="team-status draw">引き分け</div>`;
                    }
                }

                const cardOpacity = isTeamMatchFinished ? '0.9' : '1';
                
                let html = `
                <div class="m-card" style="opacity: ${cardOpacity};">
                    <div class="mc-top"><span>${courtDisplay}</span><span>${TS.meta.tourney || ''} (${TS.gender})</span></div>
                    <div class="team-battle-area">
                        ${statusHtml}
                        <div class="tba-names"><span style="color:${isTeamMatchFinished ? '#555' : 'var(--blue)'};">${TS.teamL}</span><span style="font-size:0.9rem;color:#888;">VS</span><span style="color:${isTeamMatchFinished ? '#555' : 'var(--red)'};">${TS.teamR}</span></div>
                        <div class="tba-wins"><span style="color:${isTeamMatchFinished ? '#555' : 'var(--blue)'};">${TS.winsL}</span><span style="font-family:'Roboto Mono', monospace; color:#ccc; margin:0 15px; font-size:2rem;">-</span><span style="color:${isTeamMatchFinished ? '#555' : 'var(--red)'};">${TS.winsR}</span></div>
                    </div>
                    <div class="match-list">`;

                for (let i = 0; i < 3; i++) {
                    const matchNum = i + 1;
                    const activeS = group.activeMatchesData[matchNum];
                    const res = TS.matchResults[i];
                    
                    const order = (TS.matchOrders && TS.matchOrders[i]) ? TS.matchOrders[i] : {A:'-', B:'-', C:'-', D:'-'};
                    let pA = order.A || '-'; let pB = order.B || '';
                    let pC = order.C || '-'; let pD = order.D || '';

                    let mStatus = "waiting"; 
                    if (res) mStatus = "completed";
                    else if (isTeamMatchFinished) mStatus = "aborted"; 
                    else if (activeS && !activeS.isMatchCompleted) mStatus = "active";

                    let badgeText = "", badgeClass = "", scoreHtml = "";
                    let colorL = "#999", colorR = "#999";
                    let wrapTagStart = `<div class="match-row ${mStatus}">`;
                    let wrapTagEnd = `</div>`;

                    if (mStatus === "completed") {
                        badgeText = "試合終了"; badgeClass = "badge-finished";
                        colorL = "#555"; colorR = "#555";
                        scoreHtml = `
                            <div class="g-num" style="color:#555;">${res.gL}</div>
                            <div class="p-box" style="background:#9ca3af; color:#fff;"><span>-</span></div>
                            <div class="g-num" style="color:#555;">${res.gR}</div>
                        `;
                    } else if (mStatus === "aborted") {
                        badgeText = "打ち切り"; badgeClass = "badge-aborted";
                        colorL = "#aaa"; colorR = "#aaa";
                        scoreHtml = `
                            <div class="g-num" style="color:#ccc;">-</div>
                            <div class="p-box" style="background:#e0e0e0; color:#aaa;"><span>-</span></div>
                            <div class="g-num" style="color:#ccc;">-</div>
                        `;
                    } else if (mStatus === "active") {
                        badgeText = "▶ 試合中 (詳細へ)"; badgeClass = "badge-live";
                        colorL = "var(--blue)"; colorR = "var(--red)";
                        const d = getDisp(activeS.pL, activeS.pR, activeS.isFinal);
                        scoreHtml = `
                            <div class="g-num" style="color:var(--blue);">${activeS.gL}</div>
                            <div class="p-box" style="background:#333; color:#fff;"><span>${d.l}</span><span style="margin:0 3px;">-</span><span>${d.r}</span></div>
                            <div class="g-num" style="color:var(--red);">${activeS.gR}</div>
                        `;
                        wrapTagStart = `<a href="live.html?court=${activeS.meta.court}" class="match-row active" style="display:block; text-decoration:none;">`;
                        wrapTagEnd = `</a>`;
                    } else { 
                        badgeText = "試合前"; badgeClass = "badge-waiting";
                        colorL = "#999"; colorR = "#999";
                        scoreHtml = `
                            <div class="g-num" style="color:#ccc;">0</div>
                            <div class="p-box" style="background:#e0e0e0; color:#aaa;"><span>-</span></div>
                            <div class="g-num" style="color:#ccc;">0</div>
                        `;
                    }

                    html += `
                    ${wrapTagStart}
                        <div class="match-title"><span class="${badgeClass}">第${matchNum}マッチ ${badgeText}</span></div>
                        <div class="match-content">
                            <div class="m-players left" style="color:${colorL};">${pA}<br><span style="font-size:0.75rem;">${pB}</span></div>
                            <div class="m-score-area">
                                ${scoreHtml}
                            </div>
                            <div class="m-players right" style="color:${colorR};">${pC}<br><span style="font-size:0.75rem;">${pD}</span></div>
                        </div>
                    ${wrapTagEnd}`;
                }
                html += `</div></div>`;
                return html;
            }).join('');
        }
    </script>
</body>
</html>
